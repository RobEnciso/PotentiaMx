<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: #f8fafc; overflow: hidden; }
        
        /* Lienzo estricto para HyperFrames */
        #comp-root { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #f8fafc; }

        /* Burbuja de diálogo de José */
        #bubble {
            position: absolute;
            top: 220px;
            left: 350px;
            background: white;
            border: 6px solid #0f172a;
            border-radius: 30px;
            padding: 20px 40px;
            font-size: 40px;
            font-weight: 700;
            color: #0f172a;
            box-shadow: 10px 10px 0px #0f172a;
            opacity: 0;
            transform: scale(0.8);
            transform-origin: bottom right;
            z-index: 10;
        }
        /* El "piquito" de la burbuja */
        #bubble::after {
            content: '';
            position: absolute;
            bottom: -25px;
            right: 80px;
            border-width: 25px 25px 0 0;
            border-style: solid;
            border-color: #0f172a transparent transparent transparent;
        }

        /* Estilos generales para dibujar a los monitos */
        svg { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; overflow: visible; }
        .line-thick { fill: none; stroke: #0f172a; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
        .fill-white { fill: white; stroke: #0f172a; stroke-width: 12; }
        .text-name { font-size: 36px; fill: #64748b; font-weight: 700; text-anchor: middle; }
    </style>
</head>
<body>
    <div id="comp-root" data-composition-id="main" data-width="1920" data-height="1080">

        <div id="bubble">¡Ya agarra la onda carnal!</div>

        <svg>
            <text x="700" y="280" class="text-name">José</text>
            <text x="1100" y="320" class="text-name">Oswaldo</text>

            <g id="jose">
                <path d="M700 700 L630 950" class="line-thick" />
                <path d="M700 700 L770 950" class="line-thick" />
                <path d="M700 460 L700 700" class="line-thick" />
                <path d="M700 500 L620 620" class="line-thick" />
                <circle cx="700" cy="400" r="60" class="fill-white" />
                <circle cx="680" cy="390" r="8" fill="#0f172a" />
                <circle cx="720" cy="390" r="8" fill="#0f172a" />
                <path d="M680 420 Q700 435 720 420" class="line-thick" stroke-width="8" />

                <g id="jose-arm">
                    <path d="M700 500 L850 420 L1040 360" class="line-thick" />
                </g>
            </g>

            <g id="oswaldo">
                <path d="M1100 740 L1030 950" class="line-thick" />
                <path d="M1100 740 L1170 950" class="line-thick" />
                <path d="M1100 500 L1100 740" class="line-thick" />
                <path d="M1100 540 L1020 660" class="line-thick" />
                <path d="M1100 540 L1180 660" class="line-thick" />

                <g id="oswaldo-head-group">
                    <circle id="o-head-shape" cx="1100" cy="440" r="60" class="fill-white" />

                    <g id="face-normal">
                        <circle cx="1080" cy="430" r="8" fill="#0f172a" />
                        <circle cx="1120" cy="430" r="8" fill="#0f172a" />
                        <path d="M1080 460 Q1100 460 1120 460" class="line-thick" stroke-width="8" />
                    </g>

                    <g id="face-angry" opacity="0">
                        <path d="M1065 410 L1090 425" class="line-thick" stroke-width="8" />
                        <path d="M1135 410 L1110 425" class="line-thick" stroke-width="8" />
                        <circle cx="1080" cy="435" r="8" fill="#0f172a" />
                        <circle cx="1120" cy="435" r="8" fill="#0f172a" />
                        <path d="M1080 470 Q1100 450 1120 470" class="line-thick" stroke-width="8" />
                        <path d="M1125 395 L1135 395 L1130 405 Z" fill="#ef4444" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>
                    </g>

                    <g id="face-sad" opacity="0">
                        <path d="M1070 420 L1090 410" class="line-thick" stroke-width="8" />
                        <path d="M1130 420 L1110 410" class="line-thick" stroke-width="8" />
                        <circle cx="1080" cy="435" r="8" fill="#0f172a" />
                        <circle cx="1120" cy="435" r="8" fill="#0f172a" />
                        <path d="M1080 470 Q1100 450 1120 470" class="line-thick" stroke-width="8" />
                        <path d="M1075 450 Q1080 460 1075 465 Q1070 460 1075 450" fill="#3b82f6" />
                    </g>

                    <g id="impact-lines" opacity="0">
                        <path d="M1040 370 L1020 350" class="line-thick" stroke="#ef4444" stroke-width="8" />
                        <path d="M1100 350 L1100 320" class="line-thick" stroke="#ef4444" stroke-width="8" />
                        <path d="M1160 370 L1180 350" class="line-thick" stroke="#ef4444" stroke-width="8" />
                    </g>
                </g>
            </g>
        </svg>
    </div>

    <script>
        // Animación coreografiada con GSAP
        const tl = gsap.timeline();

        // Fijar los puntos de rotación como si fueran articulaciones humanas
        gsap.set("#jose-arm", { transformOrigin: "700px 500px" }); // Hombro de José
        gsap.set("#oswaldo-head-group", { transformOrigin: "1100px 500px" }); // Cuello de Oswaldo

        // 0.5s: José levanta el brazo hacia atrás para tomar vuelo
        tl.to("#jose-arm", { duration: 0.3, rotation: -35, ease: "power2.out" }, 0.5)
          
          // 0.8s: Da el ZAPE hacia abajo con fuerza
          .to("#jose-arm", { duration: 0.1, rotation: 25, ease: "power4.in" }, 0.8)
          
          // Al mismo tiempo sale el texto
          .to("#bubble", { duration: 0.3, opacity: 1, scale: 1, ease: "back.out(1.5)" }, 0.8)
          
          // Efecto visual del golpe en Oswaldo (tiembla la cabeza y salen líneas)
          .to("#impact-lines", { duration: 0.1, opacity: 1 }, 0.85)
          .to("#oswaldo-head-group", { 
              duration: 0.1, 
              rotation: 15, 
              x: 10, 
              yoyo: true, 
              repeat: 3 
          }, 0.85)
          
          // 1.1s: Las líneas de impacto desaparecen y José baja el brazo
          .to("#impact-lines", { duration: 0.1, opacity: 0 }, 1.1)
          .to("#jose-arm", { duration: 0.5, rotation: 0, ease: "power2.inOut" }, 1.2)
          
          // 1.5s: Oswaldo reacciona ENOJADO
          .to("#face-normal", { duration: 0.2, opacity: 0 }, 1.5)
          .to("#face-angry", { duration: 0.2, opacity: 1 }, 1.5)
          .to("#o-head-shape", { duration: 0.3, fill: "#fee2e2" }, 1.5) // La cara se pone roja
          
          // 3.5s: José termina de hablar (se va la burbuja)
          .to("#bubble", { duration: 0.3, opacity: 0, scale: 0.8, ease: "power2.in" }, 3.5)
          
          // 4.0s: Oswaldo cambia de Enojado a TRISTE
          .to("#face-angry", { duration: 0.2, opacity: 0 }, 4.0)
          .to("#face-sad", { duration: 0.2, opacity: 1 }, 4.0)
          .to("#o-head-shape", { duration: 0.3, fill: "#ffffff" }, 4.0) // Se le quita lo rojo
          
          // 5.5s: Pausa para poder apreciar el final de la animación
          .to({}, { duration: 1.5 });

        // Etiqueta para que HyperFrames grabe correctamente
        window.__timelines = { "main": tl };
    </script>
</body>
</html>
